<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>湘南海岸美化・Web GIS リアルタイムダッシュボード</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 font-sans text-slate-100 overflow-hidden">

    <div id="leaflet-map" class="absolute inset-0 z-0"></div>

    <div class="absolute top-24 left-6 z-[1001]">
        <button id="menu-open-btn" class="hamburger-btn">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>

    <div id="menu-overlay" class="menu-overlay hidden"></div>

    <div id="side-menu" class="side-menu-drawer -left-full">
        <div class="drawer-header">
            <button id="menu-close-btn" class="drawer-close-btn">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <span class="drawer-title">メニュー</span>
        </div>

        <nav class="drawer-nav">
            <a href="#" class="drawer-item">お知らせ</a>
            <a href="#" class="drawer-item">ごみ一覧</a>
            <a href="#" class="drawer-item">通知</a>
        </nav>
    </div>

    <script>
        let map;
        let yellowPoly, redPoly, dangerPoly;

        function initMap() {
            const initialLatLng = [35.3168, 139.3940];
            const zoomLevel = 15;
            map = L.map('leaflet-map', {
                zoomControl: true, 
                attributionControl: false 
            }).setView(initialLatLng, zoomLevel);

            const tileUrl = "https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg";
            L.tileLayer(tileUrl, {
                maxNativeZoom: 18,
                minZoom: 11
            }).addTo(map);

            // 🟡 左側：黄色エリア
            const yellowCoords = [[35.31751, 139.38287], [35.31697, 139.38283], [35.31713, 139.39223], [35.31764, 139.39215]];
            yellowPoly = L.polygon(yellowCoords, { color: '#eab308', fillColor: '#eab308', fillOpacity: 0.5, weight: 2, lineCap: 'round' }).addTo(map).bindPopup("<strong>西側エリア</strong><br>ゴミ量: 中");

            // 🔴 右側：赤エリア
            const redCoords = [[35.31764, 139.39215], [35.31713, 139.39223], [35.31610, 139.41000], [35.31665, 139.41000]];
            redPoly = L.polygon(redCoords, { color: '#ef4444', fillColor: '#ef4444', fillOpacity: 0.5, weight: 2, lineCap: 'round' }).addTo(map).bindPopup("<strong>東側エリア</strong><br>ゴミ量: 多 (優先回収エリア)");

            // 🟣 中央：紫エリア
            const dangerAreaCoords = [[35.31740, 139.39700], [35.31650, 139.39850], [35.31720, 139.40000]];
            dangerPoly = L.polygon(dangerAreaCoords, { color: '#a855f7', fillColor: '#a855f7', fillOpacity: 0.6, weight: 2, lineCap: 'round' }).addTo(map).bindPopup("<strong>注射器発見要注意区域</strong>");

            // ⚠️ 警告マーカー
            const dangerMarker = L.marker([35.31650, 139.39850], {
                icon: L.divIcon({
                    className: 'custom-pin-danger',
                    html: '<div class="bg-red-500 text-white rounded-full p-2.5 shadow-lg border-2 border-white flex items-center justify-center w-10 h-10 animate-bounce text-sm hover:scale-115 transition-all">⚠️</div>',
                    iconSize: [40, 40],
                    iconAnchor: [20, 20]
                })
            }).addTo(map);

            setTimeout(() => { map.invalidateSize(); }, 300);
        }

        // ドロワーメニュー制御
        const openBtn = document.getElementById('menu-open-btn');
        const closeBtn = document.getElementById('menu-close-btn');
        const sideMenu = document.getElementById('side-menu');
        const overlay = document.getElementById('menu-overlay');

        function openMenu() {
            sideMenu.classList.remove('-left-full');
            sideMenu.classList.add('left-0');
            overlay.classList.remove('hidden');
            setTimeout(() => overlay.classList.add('opacity-100'), 10);
        }

        function closeMenu() {
            sideMenu.classList.remove('left-0');
            sideMenu.classList.add('-left-full');
            overlay.classList.remove('opacity-100');
            setTimeout(() => overlay.classList.add('hidden'), 300);
        }

        openBtn.addEventListener('click', openMenu);
        closeBtn.addEventListener('click', closeMenu);
        overlay.addEventListener('click', closeMenu);

        window.addEventListener('DOMContentLoaded', initMap);
        window.addEventListener('resize', () => { if (map) map.invalidateSize(); });
    </script>
</body>
</html>
