<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ジオフェンス テスト</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
crossorigin=""></script>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<style>
    #status-panel {
        font-size: 18px;
        font-weight: bold;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 5px;
    }
    .outside { background-color: #ffcccc; color: #cc0000; }
    .inside { background-color: #d4edda; color: #155724; }
</style>
</head>
<body>

<div id="status-panel" class="outside">
    現在の状態: 読み込み中...
</div>
<div id="coordinates">現在地: 緯度 ---, 経度 ---</div>
<br>

<div id="map" style="width:100%; max-width:800px; height:600px;"></div>

<script>
var map;
var currentMarker = null; // 現在地を表示するマーカー
var fencePolygon; // 画面上のポリゴンオブジェクト

// 【設定】テスト用のジオフェンス（多角形）の座標
// ★★★ 家の近くで試す時は、ここを家の周りの座標（4点以上で、最初と最後の点を同じにする）に書き換えてください ★★★
// 例：[経度, 緯度] の順番であることに注意してください（Turf.jsの仕様）
var fenceCoordinates = [
    [139.782373, 35.67958],
    [139.779068, 35.676238],
    [139.782650, 35.672000],
    [139.786813, 35.677072],
    [139.782373, 35.67958] // 最後は必ず最初の点と同じ座標にする（閉じた多角形にするため）
];

$(function(){
    // 地図の初期化（最初はテストエリア付近の中心に設定）
    var defaultCenter = [35.681, 139.656];
    var zoom = 16;
    map = L.map("map").setView(defaultCenter, zoom);

    // 地理院タイルの読み込み
    var tileUrl = "https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png";
    var copyUrl = "<a href='https://maps.gsi.go.jp/development/ichiran.html' target='_blank'>地理院タイル</a>";
    L.tileLayer(tileUrl, {attribution: copyUrl}).addTo(map);

    // Turf.js用のポリゴンデータを作成
    var turfPolygon = turf.polygon([fenceCoordinates]);

    // Leafletの地図上にポリゴン（ジオフェンスの枠線）を描画
    // Leafletは [緯度, 経度] なので、逆転させて変換して表示します
    var leafletCoords = fenceCoordinates.map(function(coord) {
        return [coord[1], coord[0]];
    });
    fencePolygon = L.polygon(leafletCoords, {color: 'blue', fillColor: '#3388ff', fillOpacity: 0.2}).addTo(map);

    // 位置情報の常時監視を開始
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(
            function(position) {
                // 現在地の緯度・経度を取得
                var lat = position.coords.latitude;
                var lng = position.coords.longitude;

                // 画面のテキストを更新
                $("#coordinates").text("現在地: 緯度 " + lat.toFixed(6) + ", 経度 " + lng.toFixed(6));

                // 1. 地図上の現在地マーカーを更新
                if (currentMarker) {
                    currentMarker.setLatLng([lat, lng]);
                } else {
                    currentMarker = L.marker([lat, lng]).addTo(map).bindPopup("あなた現在地").openPopup();
                    // 初回取得時に現在地へジャンプ
                    map.setView([lat, lng], 17);
                }

                // 2. ジオフェンス判定 (Turf.js)
                // Turf.jsは [経度, 緯度] の順でポイントを作成する
                var currentPoint = turf.point([lng, lat]);
                var isInside = turf.booleanPointInPolygon(currentPoint, turfPolygon);

                // 3. 判定結果に応じて画面表示を変える
                if (isInside) {
                    $("#status-panel").text("現在の状態: 【海岸内（エリア内）】位置情報を送信・記録中...").removeClass("outside").addClass("inside");
                    fencePolygon.setStyle({color: 'green', fillColor: '#28a745'});
                } else {
                    $("#status-panel").text("現在の状態: 【海岸外（エリア外）】位置情報は無視しています").removeClass("inside").addClass("outside");
                    fencePolygon.setStyle({color: 'red', fillColor: '#dc3545'});
                }
            },
            function(error) {
                // エラーハンドリング
                var msg = "位置情報の取得に失敗しました: ";
                switch(error.code) {
                    case error.PERMISSION_DENIED: msg += "位置情報の利用が許可されていません。"; break;
                    case error.POSITION_UNAVAILABLE: msg += "位置情報が利用できません。"; break;
                    case error.TIMEOUT: msg += "タイムアウトしました。"; break;
                }
                $("#status-panel").text(msg).removeClass("inside").addClass("outside");
            },
            {
                enableHighAccuracy: true, // 高精度モード（GPSを使用）
                timeout: 10000,          // 10秒でタイムアウト
                maximumAge: 0            // キャッシュされた位置情報は使わない
            }
        );
    } else {
        alert("お使いのブラウザは位置情報（Geolocation）に対応していません。");
    }
});
</script>
</body>
</html>
